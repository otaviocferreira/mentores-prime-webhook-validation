services:
  - type: web
    name: npm install && npm run build
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: HOTMART_WEBHOOK_TOKEN
        sync: false
      - key: API_KEY
        sync: false